name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm --filter @monomit/primer lint

      - name: Test
        run: pnpm --filter @monomit/primer test

      - name: Build
        run: pnpm build

      - name: Publish @monomit/primer-templates
        run: npm publish --access public
        working-directory: packages/templates
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for templates registry propagation
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for @monomit/primer-templates@$VERSION to propagate..."
          for i in $(seq 1 12); do
            if npm view @monomit/primer-templates@$VERSION version 2>/dev/null; then
              echo "Package is live."
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "Error: package did not propagate within 2 minutes"
          exit 1
        working-directory: packages/templates

      - name: Publish @monomit/primer
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}